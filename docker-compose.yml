services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shopshare-backend
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:///./shopshare.db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shopshare-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
